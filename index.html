<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Trasee Moto România</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; }
        #map { height: 60vh; width: 100%; border-bottom: 3px solid #fbc02d; }
        
        .list-container { padding: 20px; max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #fbc02d; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        
        .route-item { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; margin-bottom: 20px; padding: 15px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .route-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(251, 192, 45, 0.2); }
        
        .route-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .route-title { font-size: 1.2rem; font-weight: bold; color: #fff; text-decoration: none; }
        .route-title:hover { color: #fbc02d; }
        .route-meta { font-size: 0.9rem; color: #fbc02d; background: rgba(251, 192, 45, 0.1); padding: 4px 10px; border-radius: 20px; }

        .image-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .gallery-img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #444; transition: opacity 0.2s; }
        .gallery-img:hover { opacity: 0.8; }

        /* Stiluri pentru popup-ul hărții */
        .leaflet-popup-content-wrapper { background: #1e1e1e; color: #fff; border: 1px solid #fbc02d; border-radius: 8px; }
        .leaflet-popup-tip { background: #fbc02d; }
        .popup-link { color: #fbc02d; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="list-container">
        <h1>Trasee Moto România</h1>

        <div class="route-item" id="route-semenic">
            <div class="route-header">
                <a href="#" class="route-title">TransSemenic (DJ582)</a>
                <span class="route-meta">60 km</span>
            </div>
            <div class="image-gallery">
                <img src="transsemenic1.jpg" alt="TransSemenic Foto 1" class="gallery-img">
                <img src="transsemenic2.jpg" alt="TransSemenic Foto 2" class="gallery-img">
                <img src="transsemenic3.jpg" alt="TransSemenic Foto 3" class="gallery-img">
            </div>
        </div>

        <div class="route-item" id="route-rarau">
            <div class="route-header">
                <a href="#" class="route-title">TransRarău (Drumul Comorilor)</a>
                <span class="route-meta">28 km</span>
            </div>
            <div class="image-gallery">
                <img src="transrarau1.jpg" alt="TransRarău Foto 1" class="gallery-img">
                <img src="transrarau2.jpg" alt="TransRarău Foto 2" class="gallery-img">
                <img src="transrarau3.jpg" alt="TransRarău Foto 3" class="gallery-img">
            </div>
        </div>

        <div class="route-item" id="route-gutai">
            <div class="route-header">
                <a href="#" class="route-title">Pasul Gutâi (DN18)</a>
                <span class="route-meta">~35 km</span>
            </div>
            <div class="image-gallery">
                <img src="gutai.jpg" alt="Pasul Gutâi Foto 1" class="gallery-img">
            </div>
        </div>

        <div class="route-item" id="route-brezoi">
            <div class="route-header">
                <a href="#" class="route-title">Valea Latoriței (Runcu-Brezoi)</a>
                <span class="route-meta">~40 km</span>
            </div>
            <div class="image-gallery">
                <img src="brezoi.jpg" alt="Valea Latoriței Foto 1" class="gallery-img">
            </div>
        </div>

        <div class="route-item" id="route-herculane">
            <div class="route-header">
                <a href="https://herculaneproject.ro/despre-herculane/" target="_blank" class="route-title">Băile Herculane (Valea Cernei)</a>
                <span class="route-meta">~50 km (trasee zonă)</span>
            </div>
            <div class="image-gallery">
                <img src="herculane1.jpg" alt="Băile Herculane Foto 1" class="gallery-img">
                <img src="herculane2.jpg" alt="Băile Herculane Foto 2" class="gallery-img">
                <img src="herculane3.jpg" alt="Băile Herculane Foto 3" class="gallery-img">
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inițializare hartă centrata pe mijlocul României
        const map = L.map('map').setView([45.9432, 24.9668], 7);

        // Adăugare strat hărții (OpenStreetMap - stil Dark)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Coordonate trasee [Lat, Long]
        const semenic = [45.1833, 22.0500];
        const rarau = [47.4500, 25.5667];
        const gutai = [47.7000, 23.7833];
        const brezoi = [45.3500, 24.2500];
        const herculane = [44.8833, 22.4167]; // NOU: Coordonate Herculane

        // Adăugare Markeri (Pin-uri) pe hartă
        const markerSemenic = L.marker(semenic).addTo(map).bindPopup('<a href="#route-semenic" class="popup-link">TransSemenic</a>');
        const markerRarau = L.marker(rarau).addTo(map).bindPopup('<a href="#route-rarau" class="popup-link">TransRarău</a>');
        const markerGutai = L.marker(gutai).addTo(map).bindPopup('<a href="#route-gutai" class="popup-link">Pasul Gutâi</a>');
        const markerBrezoi = L.marker(brezoi).addTo(map).bindPopup('<a href="#route-brezoi" class="popup-link">Runcu-Brezoi</a>');
        const markerHerculane = L.marker(herculane).addTo(map).bindPopup('<a href="#route-herculane" class="popup-link">Băile Herculane</a>'); // NOU marker

        // Funcții pentru scroll lin când apeși pe un marker
        function scrollToRoute(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        // Adăugare evenimente de click pe markeri
        markerSemenic.on('click', () => scrollToRoute('route-semenic'));
        markerRarau.on('click', () => scrollToRoute('route-rarau'));
        markerGutai.on('click', () => scrollToRoute('route-gutai'));
        markerBrezoi.on('click', () => scrollToRoute('route-brezoi'));
        markerHerculane.on('click', () => scrollToRoute('route-herculane')); // NOU event

    </div>

</body>
</html>
